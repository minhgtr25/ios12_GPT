<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gemini AI">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/12128/12128416.png">

    <title>Gemini AI</title>
    
    <!-- 
    LƯỚI KÍCH HOẠT: Disabled marked.js vì iOS 12 không hỗ trợ tốt.
    Thay vào đó dùng parseSimpleMarkdown() trong script.js - tương thích 100% iOS 12
    -->

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Load config.js TRƯỚC script.js để cấu hình API key -->
    <script src="config.js"></script>

    <div id="app-container">
        <div id="header">
            <div id="header-top">
                <h2>Gemini AI Chat</h2>
                <div id="header-controls">
                    <select id="model-selector" title="Chọn AI Model">
                        <option value="gemini-2.5-flash">2.5-Flash</option>
                        <option value="gemini-2.5-flash-lite">2.5-Flash-Lite</option>
                        <option value="gemini-3.5-flash">3.5-Flash</option>
                        <option value="gemini-2.0-flash">2.0-Flash</option>
                    </select>
                </div>
            </div>
            <div id="header-actions">
                <button id="export-btn" title="Xuất lịch sử chat">💾 Xuất</button>
                <button id="import-btn" title="Nhập lịch sử chat">📂 Nhập</button>
                <button id="clear-btn" title="Xóa lịch sử chat">🗑️ Xóa</button>
            </div>
        </div>

        <div id="chat-container">
            <div class="message bot">Xin chào! Chọn model AI ở trên để bắt đầu. History chat sẽ được lưu tự động.</div>
        </div>

        <div id="input-area">
            <div class="input-wrapper">
                <input type="file" id="file-input" accept="image/*" style="display:none;">
                <button id="upload-btn" onclick="document.getElementById('file-input').click()">📷</button>
                <input type="text" id="user-input" placeholder="Nhập tin nhắn..." autocomplete="off">
                <button id="send-btn">Gửi</button>
            </div>
            <div id="preview-container" style="display:none;">
                <span id="preview-text">Đã chọn 1 ảnh</span>
                <button id="remove-img-btn" onclick="clearSelectedImage()">❌</button>
            </div>
        </div>
    </div>

    <!-- Hidden file input for import -->
    <input type="file" id="import-file-input" accept=".json" style="display:none;">

    <script src="script.js"></script>
</body>
</html>
