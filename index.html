<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gemini AI">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/12128/12128416.png">

    <title>Gemini AI</title>
    
    <!-- NHÚNG THƯ VIỆN DỊCH MARKDOWN (TỰ ĐỘNG ĐỔI ĐẦU MỤC VÀ KHỐI CODE) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app-container">
        <div id="header">
            <h2>Gemini 2.5 Flash</h2>
        </div>

        <div id="chat-container">
            <div class="message bot">Xin chào! Tôi đã được nâng cấp trình hiển thị. Giờ đây các đoạn văn bản có tiêu đề, danh sách hay các đoạn mã code sẽ được tự động định dạng cho bạn dễ nhìn nhất!</div>
        </div>

        <div id="input-area">
            <div class="input-wrapper">
                <input type="file" id="file-input" accept="image/*" style="display:none;">
                <button id="upload-btn" onclick="document.getElementById('file-input').click()">📷</button>
                <input type="text" id="user-input" placeholder="Nhập tin nhắn..." autocomplete="off">
                <button id="send-btn">Gửi</button>
            </div>
            <div id="preview-container" style="display:none;">
                <span id="preview-text">Đã chọn 1 ảnh</span>
                <button id="remove-img-btn" onclick="clearSelectedImage()">❌</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
